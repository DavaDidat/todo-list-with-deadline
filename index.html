<!doctype html>
<html>
  <head>
    <title>To Do List</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>To Do List</h1>

      <div class="isi">
        <input type="text" id="todo-input" placeholder="Masukkan tugas..." />
        <input type="datetime-local" id="deadline-input" />
        <button id="add-btn">Tambah</button>

        <ul id="todo-list"></ul>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
